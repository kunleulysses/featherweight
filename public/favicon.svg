<!-- public/favicon.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#4299e1"/>
  
  <!-- Elegant Feather Design -->
  <g transform="translate(20, 15) scale(0.6)">
    <!-- Feather shaft -->
    <path d="M50 10 L50 90" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Feather barbs - right side -->
    <path d="M50 30 Q70 25, 90 10" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    <path d="M50 40 Q75 35, 95 20" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    <path d="M50 50 Q80 45, 95 30" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    <path d="M50 60 Q75 55, 90 40" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    <path d="M50 70 Q70 65, 85 50" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Feather barbs - left side -->
    <path d="M50 30 Q30 25, 10 10" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    <path d="M50 40 Q25 35, 5 20" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    <path d="M50 50 Q20 45, 5 30" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    <path d="M50 60 Q25 55, 10 40" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    <path d="M50 70 Q30 65, 15 50" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>